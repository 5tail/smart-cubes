name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # --- 套件（根目錄）---
      - name: Install (package)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build (ESM/CJS/d.ts)
        run: npm run build

      # --- demo（Vite）---
      - name: Install (demo)
        run: npm ci
        working-directory: demo
      - name: Typecheck (demo)
        run: npx tsc --noEmit
        working-directory: demo
      - name: Build (demo)
        run: npm run build
        working-directory: demo
